<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>she said yes 🥹</title>
    <link rel="stylesheet" href="global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 40px;">

        <div style="text-align: left; background: #F7F3F0; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; border: 1px solid #eee;">
            <div class="fade-1">
                <p style="font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; color: #3f3034;">
                    theorem: <span style="font-weight: normal;" id="saidYesLine">they said yes.</span>
                </p>
                <p style="font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; color: #3f3034;">
                    proof: <span style="font-weight: normal;">you asked.</span>
                </p>
                <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">
            </div>
            <div class="fade-2">
                <p style="font-family: 'Times New Roman', serif; font-style: italic; font-size: 1.2rem; margin-bottom: 10px; color: #3f3034;">
                    therefore, the integral of your love over time is infinite:
                </p>
                <div style="text-align: center; margin: 25px 0;">
                    <span style="font-family: 'Times New Roman', serif; font-size: 2.2rem; font-style: italic; color: #a6545d;">
                        &int;<sub>now</sub><sup>&infin;</sup> love(t) dt = &infin;
                    </span>
                </div>
            </div>
            <div class="fade-3" style="text-align: right; margin-top: 20px;">
                <span style="font-family: 'Times New Roman', serif; font-weight: bold; font-size: 1.5rem; color: #3f3034;">Q.E.D.</span>
            </div>
        </div>

        <p class="fade-4" style="margin-top: 30px; font-size: 1.8rem; color: #3f3034;" id="seeYouLine">
            see u on the fourteenth ❤️
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('to');

        if (name) {
            document.getElementById('saidYesLine').textContent = `${name} said yes.`;
            document.getElementById('seeYouLine').textContent = `see u on the fourteenth ❤️`;
            document.title = `${name} said yes 🥹`;
        }

        // Fire confetti on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                const colors = ['#ca8a91', '#a6545d'];
                [[{y:0,x:0},315],[{y:0,x:1},225],[{y:1,x:0},45],[{y:1,x:1},135]].forEach(([origin, angle]) => {
                    confetti({ particleCount: 150, spread: 90, origin, ticks: 400, gravity: 0.65, decay: 0.94, startVelocity: 35, angle, colors });
                });
            }, 600);
        });
    </script>

    <button id="creditBtn" onclick="document.getElementById('creditPopup').classList.toggle('hidden')">♡</button>
    <div id="creditPopup" class="hidden">
        <p>made with love by</p>
        <p class="credit-name">mansha pardasani</p>
    </div>
</body>
</html>
