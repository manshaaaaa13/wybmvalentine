<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>she said yes 🥹</title>
    <link rel="stylesheet" href="global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container" style="padding: 36px 24px;">
        <div class="proof-card">
            <div class="fade-1">
                <p class="mono"><strong>theorem:</strong> <span id="saidYesLine">they said yes.</span></p>
                <p class="mono" style="margin-top:8px"><strong>proof:</strong> you asked.</p>
                <hr>
            </div>
            <div class="fade-2">
                <p class="serif-italic">therefore, the integral of your love over time is infinite:</p>
                <div class="integral">
                    &int;<sub>now</sub><sup>&infin;</sup> love(t) dt = &infin;
                </div>
            </div>
            <div class="fade-3 qed">Q.E.D.</div>
        </div>

        <p class="fade-4 see-you" id="seeYouLine">see u on the fourteenth ❤️</p>
    </div>

    <button id="creditBtn" title="credits">♡</button>
    <div id="creditPopup" class="hidden">
        <p>made with love by</p>
        <p class="credit-name">mansha pardasani</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Personalise with the recipient's name from the URL
        const params = new URLSearchParams(window.location.search);
        const name = params.get('to');

        if (name) {
            document.getElementById('saidYesLine').textContent = `${name} said yes.`;
            document.title = `${name} said yes 🥹`;
        }

        // Confetti burst on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                const colors = ['#ca8a91', '#a6545d'];
                [[{y:0,x:0},315],[{y:0,x:1},225],[{y:1,x:0},45],[{y:1,x:1},135]].forEach(([origin, angle]) => {
                    confetti({ particleCount: 150, spread: 90, origin, ticks: 400, gravity: 0.65, decay: 0.94, startVelocity: 35, angle, colors });
                });
            }, 600);
        });

        // Credit popup toggle
        document.getElementById('creditBtn').addEventListener('click', () => {
            document.getElementById('creditPopup').classList.toggle('hidden');
        });
    </script>
</body>
</html>
